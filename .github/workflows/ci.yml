name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Enforces Node 24 runtime to completely eliminate Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with Ruff
        run: ruff check backend/ models/ scripts/ sentinel/

      - name: Run Phishing Model Smoke Test
        run: python models/phishing_model.py

      - name: Run Anomaly Model Smoke Test
        run: python models/anomaly_model.py

      - name: Run Simulation Pipeline
        run: python -X utf8 scripts/simulate_attacks.py

      - name: Run Pytest Suite
        run: pytest tests/ -x -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t trustcore/sentinel-x:ci .

      - name: Verify image starts and /health responds
        run: |
          docker run -d --name sentinel-ci -p 8000:8000 trustcore/sentinel-x:ci
          sleep 10
          curl --fail http://localhost:8000/health
          docker stop sentinel-ci
