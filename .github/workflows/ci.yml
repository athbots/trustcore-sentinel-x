name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check backend/ models/ scripts/ sentinel/

      - name: Run phishing model smoke test
        run: python models/phishing_model.py

      - name: Run anomaly model smoke test
        run: python models/anomaly_model.py

      - name: Run simulation pipeline
        run: python -X utf8 scripts/simulate_attacks.py

      - name: Run pytest suite
        run: pytest tests/ -x -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trustcore/sentinel-x:ci .

      - name: Verify image starts and /health responds
        run: |
          docker run -d --name sentinel-ci -p 8000:8000 trustcore/sentinel-x:ci

          # Wait for the app to be ready (ML warmup + DB init ~10-15s)
          echo "Waiting for container to start..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Container is ready!"
              break
            fi
            echo "  Attempt $i/12 — still starting..."
          done

          # Final health check (fails CI if not ready)
          curl -f http://localhost:8000/health | python -m json.tool

          docker stop sentinel-ci
