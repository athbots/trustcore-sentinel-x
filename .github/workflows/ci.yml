name: TrustCore Sentinel CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn psutil pydantic

      - name: Basic import test
        run: |
          python -c "import fastapi, uvicorn, psutil, pydantic; print('All imports OK')"

      - name: Success
        run: echo "CI Passed ✅"