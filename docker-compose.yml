version: "3.9"

services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: trustcore-sentinel-x
    image: trustcore/sentinel-x:latest
    ports:
      - "8000:8000"
    volumes:
      # Persist logs outside the container
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/system_status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.trustcore.service=sentinel"
      - "com.trustcore.version=1.0.0"

# Named volume for persistent log storage
volumes:
  logs:
