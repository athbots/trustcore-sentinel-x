<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustCore Sentinel™ Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(24, 24, 27, 0.7);
        }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--surface-hover); padding-bottom: 20px; margin-bottom: 30px;
        }
        .header h1 { margin: 0; font-weight: 800; font-size: 24px; letter-spacing: -0.5px; }
        .header .badge {
            background: rgba(14, 165, 233, 0.1); color: var(--primary);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid var(--primary);
        }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card {
            background: var(--surface); border: 1px solid var(--surface-hover);
            border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h3 { margin-top: 0; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .score-circle {
            width: 150px; height: 150px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 20px auto; border: 4px solid var(--primary);
        }
        .score-value { font-size: 48px; font-weight: 800; }
        .log-list { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; }
        .log-item {
            padding: 12px; border-bottom: 1px solid var(--surface-hover);
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s; cursor: pointer;
        }
        .log-item:hover { background: var(--surface-hover); }
        .pill { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .pill.ALLOW { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .pill.CHALLENGE { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .pill.BLOCK { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .explainer-matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;}
        .matrix-row { background: var(--surface-hover); padding: 10px; border-radius: 8px; font-size: 13px;}
        .matrix-row .val { float: right; font-weight: bold;}
    </style>
</head>
<body>
    <div class="header">
        <h1>TrustCore Sentinel™ <span style="font-weight: 300; color: var(--text-muted)">Command Center</span></h1>
        <div class="badge">LIVE ENTERPRISE MONITORING</div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Live Identity Trust</h3>
            <div class="score-circle" id="live-score-circle">
                <div class="score-value" id="live-score">--</div>
                <div style="font-size: 12px; color: var(--text-muted)">Trust Score</div>
            </div>
            <div style="text-align: center; margin-top: 10px;" id="live-action">Awaiting Traffic...</div>
        </div>
        
        <div class="card">
            <h3>Explainability Matrix (Last Event)</h3>
            <div class="explainer-matrix" id="explainer-content">
                <div class="matrix-row">Waiting for evaluation data...</div>
            </div>
            
            <h3 style="margin-top: 30px;">Correlation Insights</h3>
            <div id="correlation-content" style="font-size: 14px; line-height: 1.5; color: var(--warning);">
                No correlation anomaly detected.
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Live Event Feed</h3>
        <ul class="log-list" id="log-list">
            <!-- Items populated by JS -->
        </ul>
    </div>

    <script>
        // Simulate WebSocket/Polling Live Data updates for Dashboard Demo
        const logList = document.getElementById('log-list');
        const liveScore = document.getElementById('live-score');
        const scoreCircle = document.getElementById('live-score-circle');
        const liveAction = document.getElementById('live-action');
        const explainer = document.getElementById('explainer-content');
        const correlation = document.getElementById('correlation-content');

        function addLog(data) {
            const li = document.createElement('li');
            li.className = 'log-item';
            
            const time = new Date().toLocaleTimeString();
            li.innerHTML = `
                <div>
                    <span style="color: var(--text-muted); font-size: 12px; margin-right: 15px;">${time}</span>
                    <strong>${data.user_id}</strong> (${data.ip_address}) — Action: ${data.action}
                </div>
                <div class="pill ${data.decision}">${data.decision}</div>
            `;
            logList.prepend(li);
            
            // Update HUD
            liveScore.innerText = data.score;
            if(data.score < 40) scoreCircle.style.borderColor = 'var(--danger)';
            else if(data.score < 75) scoreCircle.style.borderColor = 'var(--warning)';
            else scoreCircle.style.borderColor = 'var(--success)';
            
            liveAction.innerText = `Decision: ${data.decision} (Latency: ${data.latency}ms)`;
            
            // Render Explainer Breakdown
            let html = "";
            let riskReasons = [];
            if(data.explainer) {
                data.explainer.engine_contributions.forEach(eng => {
                    html += `<div class="matrix-row">${eng.engine} <span class="val">${Math.round(eng.score)}/100</span></div>`;
                });
                explainer.innerHTML = html;
                
                if(data.explainer.correlation_analysis) {
                    correlation.innerHTML = data.explainer.correlation_analysis.map(c => `<div>⚠️ ${c}</div>`).join("");
                }
            }
        }

        // Mock event stream just for visual UI testing if backend is not wired to websockets yet
        // In real deploy, this hooks to Kafka/FastAPI WebSockets
        setInterval(async () => {
            // Using placeholder logic directly in the UI *only* if fetch fails to visually show layout
            // Actually, we'll wait for the simulate_enterprise.py to hit the endpoints, and UI will rely on local fetch
            try {
                // If we built a '/metrics/latest' endpoint
            } catch(e) {}
        }, 3000);
        
        // Mocking a starting state
        addLog({
            user_id: "emp_john_doe", ip_address: "192.168.1.50", action: "login",
            decision: "ALLOW", score: 98, latency: 12,
            explainer: {
                engine_contributions: [
                    {engine: "Identity", score: 100},
                    {engine: "Behavior", score: 100},
                    {engine: "Graph", score: 100},
                    {engine: "AI NLP", score: 90}
                ],
                correlation_analysis: ["Signals align perfectly."]
            }
        })
    </script>
</body>
</html>
